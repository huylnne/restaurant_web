<svg xmlns="http://www.w3.org/2000/svg" width="6800" height="7000" viewBox="0 0 6800 7000">
  <defs>
    <marker id="nav" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="16" markerHeight="16" orient="auto">
      <path d="M 1 1 L 13 7 L 1 13 z" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
    </marker>
    <marker id="diamond" viewBox="0 0 16 16" refX="14" refY="8" markerWidth="18" markerHeight="18" orient="auto">
      <path d="M 1 8 L 8 1 L 15 8 L 8 15 z" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: #ffffff; stroke: #000000; stroke-width: 9; }
      .title { font: 900 130px Arial, Helvetica, sans-serif; fill: #000000; }
      .cls { fill: #fff2a8; stroke: #000000; stroke-width: 8; }
      .head { fill: #ecd85a; stroke: #000000; stroke-width: 8; }
      .sep { stroke: #000000; stroke-width: 6; }
      .name { font: 900 100px Arial, Helvetica, sans-serif; fill: #000000; }
      .member { font: 900 84px Arial, Helvetica, sans-serif; fill: #000000; }
      .method { font: 900 84px Arial, Helvetica, sans-serif; fill: #000000; }
      .nav { fill: none; stroke: #000000; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#nav); }
      .agg { fill: none; stroke: #000000; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; marker-start: url(#diamond); }
      .label { font: 900 58px Arial, Helvetica, sans-serif; fill: #000000; }
      .multi { font: 900 52px Arial, Helvetica, sans-serif; fill: #000000; }
    </style>
  </defs>

  <rect class="bg" width="6800" height="7000"/>
  <rect class="frame" x="50" y="50" width="6700" height="6900"/>

  <text class="title" x="3400" y="190" text-anchor="middle">Class Diagram</text>
  <text class="title" x="3400" y="320" text-anchor="middle" font-size="105px">He Thong Quan Ly Nha Hang</text>

  <!--
    Left col 140..1700 | Gutter 1700..3300 | Right col 3300..4860
    Lanes: assigned=1750, paid=2200, selected=2650
    Far-left: makes=100, offers=300, has=540
    Far-right: creates=4980, writes=5280, reviewed=5580
  -->

  <!-- employs -->
  <path class="agg" d="M 1675 820 L 3325 820"/>
  <text class="label" x="2500" y="700" text-anchor="middle">employs</text>
  <text class="multi" x="1560" y="760">1</text>
  <text class="multi" x="3240" y="760">0..*</text>

  <!-- has -->
  <path class="agg" d="M 540 1180 L 540 1620"/>
  <text class="label" x="700" y="1360" text-anchor="start">has</text>
  <text class="multi" x="460" y="1140">1</text>
  <text class="multi" x="460" y="1580">0..*</text>

  <!-- offers -->
  <path class="agg" d="M 300 1180 L 300 3080"/>
  <text class="label" x="460" y="2080" text-anchor="start">offers</text>
  <text class="multi" x="220" y="1140">1</text>
  <text class="multi" x="220" y="3040">0..*</text>

  <!-- creates -->
  <path class="nav" d="M 4980 2480 L 4980 3080"/>
  <text class="label" x="5120" y="2740" text-anchor="start">creates</text>
  <text class="multi" x="4920" y="2440">1</text>
  <text class="multi" x="4920" y="3120">0..*</text>

  <!-- makes -->
  <path class="nav" d="M 3300 1880 L 100 1880 L 100 4520 L 140 4520"/>
  <text class="label" x="820" y="1820" text-anchor="middle">makes</text>
  <text class="multi" x="3260" y="1840">1</text>
  <text class="multi" x="160" y="4460">0..*</text>

  <!-- assigned to lane x=1750 -->
  <path class="nav" d="M 1675 2000 L 1750 2000 L 1750 3340 L 3325 3340"/>
  <text class="label" x="1920" y="2620" text-anchor="start">assigned to</text>
  <text class="multi" x="1560" y="1960">1</text>
  <text class="multi" x="3240" y="3300">0..*</text>

  <!-- paid by lane x=2200 -->
  <path class="nav" d="M 3300 3680 L 2200 3680 L 2200 5720 L 1675 5720"/>
  <text class="label" x="2340" y="4680" text-anchor="start">paid by</text>
  <text class="multi" x="3260" y="3640">1</text>
  <text class="multi" x="1560" y="5680">0..1</text>

  <!-- selected as lane x=2650 -->
  <path class="nav" d="M 1675 3880 L 2650 3880 L 2650 4520 L 3325 4520"/>
  <text class="label" x="2780" y="4160" text-anchor="start">selected as</text>
  <text class="multi" x="1560" y="3840">1</text>
  <text class="multi" x="3240" y="4480">0..*</text>

  <!-- contains -->
  <path class="nav" d="M 4050 4120 L 4050 4520"/>
  <text class="label" x="4180" y="4280" text-anchor="start">contains</text>
  <text class="multi" x="3990" y="4080">1</text>
  <text class="multi" x="3990" y="4560">1..*</text>

  <!-- writes lane x=5280 -->
  <path class="nav" d="M 4815 2480 L 5280 2480 L 5280 5720 L 3325 5720"/>
  <text class="label" x="5400" y="4000" text-anchor="start">writes</text>
  <text class="multi" x="4775" y="2440">1</text>
  <text class="multi" x="3240" y="5680">0..*</text>

  <!-- reviewed by lane x=5580 -->
  <path class="nav" d="M 4815 3680 L 5580 3680 L 5580 5720 L 4050 5720"/>
  <text class="label" x="5700" y="4680" text-anchor="start">reviewed by</text>
  <text class="multi" x="4775" y="3640">1</text>
  <text class="multi" x="3970" y="5680">0..1</text>

  <!-- Row 1 -->
  <g id="Branch">
    <rect class="cls" x="140" y="440" width="1560" height="740"/>
    <rect class="head" x="140" y="440" width="1560" height="135"/>
    <text class="name" x="920" y="540" text-anchor="middle">Branch</text>
    <line class="sep" x1="140" y1="575" x2="1700" y2="575"/>
    <text class="member" x="190" y="675">+ name: string</text>
    <text class="member" x="190" y="770">+ address: string</text>
    <text class="member" x="190" y="865">+ phone: string</text>
    <text class="member" x="190" y="960">+ openTime: time</text>
    <text class="member" x="190" y="1055">+ closeTime: time</text>
    <line class="sep" x1="140" y1="1110" x2="1700" y2="1110"/>
    <text class="method" x="190" y="1140">+ manageTables(): void</text>
  </g>

  <g id="Employee">
    <rect class="cls" x="3300" y="440" width="1560" height="800"/>
    <rect class="head" x="3300" y="440" width="1560" height="135"/>
    <text class="name" x="4080" y="540" text-anchor="middle">Employee</text>
    <line class="sep" x1="3300" y1="575" x2="4860" y2="575"/>
    <text class="member" x="3350" y="675">+ fullName: string</text>
    <text class="member" x="3350" y="770">+ position: string</text>
    <text class="member" x="3350" y="865">+ salary: decimal</text>
    <text class="member" x="3350" y="960">+ status: string</text>
    <line class="sep" x1="3300" y1="1030" x2="4860" y2="1030"/>
    <text class="method" x="3350" y="1110">+ confirmReservation(): void</text>
    <text class="method" x="3350" y="1200">+ updateOrderStatus(): void</text>
  </g>

  <!-- Row 2 -->
  <g id="Table">
    <rect class="cls" x="140" y="1620" width="1560" height="1020"/>
    <rect class="head" x="140" y="1620" width="1560" height="135"/>
    <text class="name" x="920" y="1720" text-anchor="middle">Table</text>
    <line class="sep" x1="140" y1="1755" x2="1700" y2="1755"/>
    <text class="member" x="190" y="1855">+ tableNumber: int</text>
    <text class="member" x="190" y="1950">+ capacity: int</text>
    <text class="member" x="190" y="2045">+ status: string</text>
    <text class="member" x="190" y="2140">+ qrToken: string</text>
    <line class="sep" x1="140" y1="2200" x2="1700" y2="2200"/>
    <text class="method" x="190" y="2300">+ isAvailable(): boolean</text>
    <text class="method" x="190" y="2395">+ reserve(): void</text>
    <text class="method" x="190" y="2490">+ occupy(): void</text>
    <text class="method" x="190" y="2585">+ release(): void</text>
  </g>

  <g id="User">
    <rect class="cls" x="3300" y="1620" width="1560" height="860"/>
    <rect class="head" x="3300" y="1620" width="1560" height="135"/>
    <text class="name" x="4080" y="1720" text-anchor="middle">User</text>
    <line class="sep" x1="3300" y1="1755" x2="4860" y2="1755"/>
    <text class="member" x="3350" y="1855">+ username: string</text>
    <text class="member" x="3350" y="1950">+ fullName: string</text>
    <text class="member" x="3350" y="2045">+ phone: string</text>
    <text class="member" x="3350" y="2140">+ role: string</text>
    <line class="sep" x1="3300" y1="2200" x2="4860" y2="2200"/>
    <text class="method" x="3350" y="2300">+ login(): boolean</text>
    <text class="method" x="3350" y="2395">+ createOrder(): Order</text>
  </g>

  <!-- Row 3 -->
  <g id="MenuItem">
    <rect class="cls" x="140" y="3080" width="1560" height="960"/>
    <rect class="head" x="140" y="3080" width="1560" height="135"/>
    <text class="name" x="920" y="3180" text-anchor="middle">MenuItem</text>
    <line class="sep" x1="140" y1="3215" x2="1700" y2="3215"/>
    <text class="member" x="190" y="3315">+ name: string</text>
    <text class="member" x="190" y="3410">+ description: string</text>
    <text class="member" x="190" y="3505">+ price: decimal</text>
    <text class="member" x="190" y="3600">+ category: string</text>
    <text class="member" x="190" y="3695">+ isAvailable: boolean</text>
    <line class="sep" x1="140" y1="3750" x2="1700" y2="3750"/>
    <text class="method" x="190" y="3850">+ updatePrice(): void</text>
    <text class="method" x="190" y="3945">+ markUnavailable(): void</text>
  </g>

  <g id="Order">
    <rect class="cls" x="3300" y="3080" width="1560" height="1040"/>
    <rect class="head" x="3300" y="3080" width="1560" height="135"/>
    <text class="name" x="4080" y="3180" text-anchor="middle">Order</text>
    <line class="sep" x1="3300" y1="3215" x2="4860" y2="3215"/>
    <text class="member" x="3350" y="3315">+ arrivalTime: datetime</text>
    <text class="member" x="3350" y="3410">+ numberOfGuests: int</text>
    <text class="member" x="3350" y="3505">+ status: string</text>
    <text class="member" x="3350" y="3600">+ totalAmount: decimal</text>
    <text class="member" x="3350" y="3695">+ orderType: string</text>
    <line class="sep" x1="3300" y1="3750" x2="4860" y2="3750"/>
    <text class="method" x="3350" y="3850">+ addItem(item): void</text>
    <text class="method" x="3350" y="3945">+ calculateTotal(): decimal</text>
    <text class="method" x="3350" y="4040">+ changeStatus(status): void</text>
  </g>

  <!-- Row 4 -->
  <g id="Reservation">
    <rect class="cls" x="140" y="4520" width="1560" height="860"/>
    <rect class="head" x="140" y="4520" width="1560" height="135"/>
    <text class="name" x="920" y="4620" text-anchor="middle">Reservation</text>
    <line class="sep" x1="140" y1="4655" x2="1700" y2="4655"/>
    <text class="member" x="190" y="4755">+ arrivalTime: datetime</text>
    <text class="member" x="190" y="4850">+ numberOfGuests: int</text>
    <text class="member" x="190" y="4945">+ status: string</text>
    <text class="member" x="190" y="5040">+ note: string</text>
    <line class="sep" x1="140" y1="5090" x2="1700" y2="5090"/>
    <text class="method" x="190" y="5190">+ confirm(): void</text>
    <text class="method" x="190" y="5285">+ cancel(): void</text>
  </g>

  <g id="OrderItem">
    <rect class="cls" x="3300" y="4520" width="1560" height="860"/>
    <rect class="head" x="3300" y="4520" width="1560" height="135"/>
    <text class="name" x="4080" y="4620" text-anchor="middle">OrderItem</text>
    <line class="sep" x1="3300" y1="4655" x2="4860" y2="4655"/>
    <text class="member" x="3350" y="4755">+ quantity: int</text>
    <text class="member" x="3350" y="4850">+ price: decimal</text>
    <text class="member" x="3350" y="4945">+ note: string</text>
    <text class="member" x="3350" y="5040">+ status: string</text>
    <line class="sep" x1="3300" y1="5090" x2="4860" y2="5090"/>
    <text class="method" x="3350" y="5190">+ updateQuantity(qty): void</text>
    <text class="method" x="3350" y="5285">+ markDone(): void</text>
  </g>

  <!-- Row 5 -->
  <g id="Payment">
    <rect class="cls" x="140" y="5720" width="1560" height="860"/>
    <rect class="head" x="140" y="5720" width="1560" height="135"/>
    <text class="name" x="920" y="5820" text-anchor="middle">Payment</text>
    <line class="sep" x1="140" y1="5855" x2="1700" y2="5855"/>
    <text class="member" x="190" y="5955">+ amount: decimal</text>
    <text class="member" x="190" y="6050">+ method: string</text>
    <text class="member" x="190" y="6145">+ status: string</text>
    <text class="member" x="190" y="6240">+ paidAt: datetime</text>
    <line class="sep" x1="140" y1="6290" x2="1700" y2="6290"/>
    <text class="method" x="190" y="6390">+ pay(): boolean</text>
    <text class="method" x="190" y="6485">+ refund(): boolean</text>
  </g>

  <g id="Review">
    <rect class="cls" x="3300" y="5720" width="1560" height="860"/>
    <rect class="head" x="3300" y="5720" width="1560" height="135"/>
    <text class="name" x="4080" y="5820" text-anchor="middle">Review</text>
    <line class="sep" x1="3300" y1="5855" x2="4860" y2="5855"/>
    <text class="member" x="3350" y="5955">+ rating: int</text>
    <text class="member" x="3350" y="6050">+ comment: string</text>
    <text class="member" x="3350" y="6145">+ createdAt: datetime</text>
    <line class="sep" x1="3300" y1="6290" x2="4860" y2="6290"/>
    <text class="method" x="3350" y="6390">+ submit(): void</text>
    <text class="method" x="3350" y="6485">+ edit(comment): void</text>
  </g>
</svg>
