<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1650" viewBox="0 0 2600 1650">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.8; rx: 8; ry: 8; }
      .head { fill: #dbeafe; stroke: #334155; stroke-width: 1.8; rx: 8; ry: 8; }
      .entity { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .col { font: 12px Consolas, "Courier New", monospace; fill: #111827; }
      .pk { fill: #0b3b8a; font-weight: 700; }
      .fk { fill: #0f766e; font-weight: 700; }
      .line { stroke: #334155; stroke-width: 1.6; fill: none; }
      .label { font: 11px Arial, sans-serif; fill: #1e293b; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L11,4 L0,8 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2600" height="1650"/>

  <!-- branches -->
  <rect class="box" x="60" y="70" width="420" height="290"/>
  <rect class="head" x="60" y="70" width="420" height="38"/>
  <text class="entity" x="78" y="95">branches</text>
  <text class="col pk" x="78" y="128">PK  branch_id : INTEGER</text>
  <text class="col" x="78" y="150">name : VARCHAR(50)</text>
  <text class="col" x="78" y="172">address : TEXT</text>
  <text class="col" x="78" y="194">phone : VARCHAR(10)</text>
  <text class="col" x="78" y="216">open_time, close_time : VARCHAR(8)</text>
  <text class="col" x="78" y="238">image_url : TEXT</text>
  <text class="col" x="78" y="260">latitude, longitude : DECIMAL(10,7)</text>
  <text class="col" x="78" y="282">is_active : BOOLEAN</text>
  <text class="col" x="78" y="304">created_at, updated_at : TIMESTAMP</text>

  <!-- users -->
  <rect class="box" x="560" y="70" width="470" height="320"/>
  <rect class="head" x="560" y="70" width="470" height="38"/>
  <text class="entity" x="578" y="95">users</text>
  <text class="col pk" x="578" y="128">PK  user_id : INTEGER</text>
  <text class="col fk" x="578" y="150">FK  branch_id -> branches.branch_id</text>
  <text class="col" x="578" y="172">username : VARCHAR(30) [unique]</text>
  <text class="col" x="578" y="194">password_hash : VARCHAR(60)</text>
  <text class="col" x="578" y="216">full_name : VARCHAR(50)</text>
  <text class="col" x="578" y="238">phone : VARCHAR(10) [unique, nullable]</text>
  <text class="col" x="578" y="260">role : ENUM(admin,manager,waiter,kitchen,user)</text>
  <text class="col" x="578" y="282">avatar_url : TEXT, is_active : BOOLEAN</text>
  <text class="col" x="578" y="304">locked : BOOLEAN, created_at : TIMESTAMP</text>

  <!-- employees -->
  <rect class="box" x="1110" y="70" width="430" height="250"/>
  <rect class="head" x="1110" y="70" width="430" height="38"/>
  <text class="entity" x="1128" y="95">employees</text>
  <text class="col pk" x="1128" y="128">PK  employee_id : INTEGER</text>
  <text class="col fk" x="1128" y="150">FK  user_id -> users.user_id</text>
  <text class="col fk" x="1128" y="172">FK  branch_id -> branches.branch_id</text>
  <text class="col" x="1128" y="194">position : VARCHAR(20)</text>
  <text class="col" x="1128" y="216">salary : DECIMAL(10,2), hire_date : TIMESTAMP</text>
  <text class="col" x="1128" y="238">status : ENUM(active,inactive,on_leave)</text>
  <text class="col" x="1128" y="260">created_at, updated_at : TIMESTAMP</text>

  <!-- tables -->
  <rect class="box" x="60" y="440" width="420" height="230"/>
  <rect class="head" x="60" y="440" width="420" height="38"/>
  <text class="entity" x="78" y="465">tables</text>
  <text class="col pk" x="78" y="498">PK  table_id : INTEGER</text>
  <text class="col fk" x="78" y="520">FK  branch_id -> branches.branch_id</text>
  <text class="col" x="78" y="542">table_number : INTEGER, capacity : INTEGER</text>
  <text class="col" x="78" y="564">status : VARCHAR(15)</text>
  <text class="col" x="78" y="586">qr_token : VARCHAR(32) [unique, nullable]</text>
  <text class="col" x="78" y="608">created_at : TIMESTAMP</text>

  <!-- menu_items -->
  <rect class="box" x="560" y="440" width="470" height="280"/>
  <rect class="head" x="560" y="440" width="470" height="38"/>
  <text class="entity" x="578" y="465">menu_items</text>
  <text class="col pk" x="578" y="498">PK  item_id : INTEGER</text>
  <text class="col fk" x="578" y="520">FK  branch_id -> branches.branch_id</text>
  <text class="col" x="578" y="542">name : VARCHAR(50), description : TEXT</text>
  <text class="col" x="578" y="564">price : DECIMAL(10,2), sale_price : DECIMAL(10,2)</text>
  <text class="col" x="578" y="586">category : VARCHAR(15)</text>
  <text class="col" x="578" y="608">is_available, is_featured : BOOLEAN</text>
  <text class="col" x="578" y="630">image_url : TEXT</text>
  <text class="col" x="578" y="652">created_at : TIMESTAMP</text>

  <!-- orders -->
  <rect class="box" x="1110" y="410" width="600" height="430"/>
  <rect class="head" x="1110" y="410" width="600" height="38"/>
  <text class="entity" x="1128" y="435">orders</text>
  <text class="col pk" x="1128" y="468">PK  order_id : INTEGER</text>
  <text class="col fk" x="1128" y="490">FK  user_id -> users.user_id (nullable)</text>
  <text class="col fk" x="1128" y="512">FK  branch_id -> branches.branch_id (nullable)</text>
  <text class="col fk" x="1128" y="534">FK  table_id -> tables.table_id (nullable)</text>
  <text class="col" x="1128" y="556">arrival_time, expected_end_time : TIMESTAMP</text>
  <text class="col" x="1128" y="578">checked_in_at : TIMESTAMP, number_of_guests : INTEGER</text>
  <text class="col" x="1128" y="600">status : VARCHAR(20), total_amount : DECIMAL(10,2)</text>
  <text class="col" x="1128" y="622">note : VARCHAR(200), order_type : VARCHAR(15)</text>
  <text class="col" x="1128" y="644">payment_status : VARCHAR(16)</text>
  <text class="col" x="1128" y="666">booking_group_id : VARCHAR(36)</text>
  <text class="col" x="1128" y="688">created_at : TIMESTAMP</text>

  <!-- order_items -->
  <rect class="box" x="60" y="760" width="420" height="220"/>
  <rect class="head" x="60" y="760" width="420" height="38"/>
  <text class="entity" x="78" y="785">order_items</text>
  <text class="col pk" x="78" y="818">PK  order_item_id : INTEGER</text>
  <text class="col fk" x="78" y="840">FK  order_id -> orders.order_id</text>
  <text class="col fk" x="78" y="862">FK  item_id -> menu_items.item_id</text>
  <text class="col" x="78" y="884">quantity : INTEGER, price : DECIMAL(10,2)</text>
  <text class="col" x="78" y="906">note : VARCHAR(200), status : ENUM</text>

  <!-- order_tables -->
  <rect class="box" x="1790" y="500" width="390" height="170"/>
  <rect class="head" x="1790" y="500" width="390" height="38"/>
  <text class="entity" x="1808" y="525">order_tables</text>
  <text class="col pk" x="1808" y="558">PK/FK  order_id -> orders.order_id</text>
  <text class="col pk" x="1808" y="580">PK/FK  table_id -> tables.table_id</text>
  <text class="col" x="1808" y="602">is_primary : BOOLEAN</text>

  <!-- payments -->
  <rect class="box" x="1110" y="920" width="520" height="260"/>
  <rect class="head" x="1110" y="920" width="520" height="38"/>
  <text class="entity" x="1128" y="945">payments</text>
  <text class="col pk" x="1128" y="978">PK  payment_id : INTEGER</text>
  <text class="col fk" x="1128" y="1000">FK  order_id -> orders.order_id [unique]</text>
  <text class="col" x="1128" y="1022">amount : DECIMAL(10,2), method : VARCHAR(15)</text>
  <text class="col" x="1128" y="1044">status : VARCHAR(16), transaction_ref : VARCHAR(64)</text>
  <text class="col" x="1128" y="1066">invoice_no : VARCHAR(20), invoice_issued_at : TIMESTAMP</text>
  <text class="col" x="1128" y="1088">paid_at : TIMESTAMP, created_at : TIMESTAMP</text>

  <!-- reviews -->
  <rect class="box" x="1710" y="920" width="470" height="220"/>
  <rect class="head" x="1710" y="920" width="470" height="38"/>
  <text class="entity" x="1728" y="945">reviews</text>
  <text class="col pk" x="1728" y="978">PK  review_id : INTEGER</text>
  <text class="col fk" x="1728" y="1000">FK  order_id -> orders.order_id [unique]</text>
  <text class="col fk" x="1728" y="1022">FK  user_id -> users.user_id</text>
  <text class="col" x="1728" y="1044">rating : INTEGER, comment : TEXT</text>
  <text class="col" x="1728" y="1066">created_at : TIMESTAMP</text>

  <!-- clean relationship lines -->
  <path class="line" marker-end="url(#arrow)" d="M480 130 L560 130"/>
  <text class="label" x="495" y="118">branches 1 - N users</text>
  <path class="line" marker-end="url(#arrow)" d="M480 170 L1110 170"/>
  <text class="label" x="760" y="160">branches 1 - N employees</text>
  <path class="line" marker-end="url(#arrow)" d="M270 360 L270 440"/>
  <text class="label" x="280" y="402">branches 1 - N tables</text>
  <path class="line" marker-end="url(#arrow)" d="M480 210 L560 520"/>
  <text class="label" x="490" y="390">branches 1 - N menu_items</text>
  <path class="line" marker-end="url(#arrow)" d="M480 250 L1110 500"/>
  <text class="label" x="760" y="455">branches 1 - N orders</text>
  <path class="line" marker-end="url(#arrow)" d="M1030 300 L1110 500"/>
  <text class="label" x="1038" y="410">users 1 - N orders</text>
  <path class="line" marker-end="url(#arrow)" d="M1030 620 L60 860"/>
  <text class="label" x="530" y="760">menu_items 1 - N order_items</text>
  <path class="line" marker-end="url(#arrow)" d="M1110 720 L480 860"/>
  <text class="label" x="760" y="805">orders 1 - N order_items</text>
  <path class="line" marker-end="url(#arrow)" d="M1710 560 L1790 560"/>
  <text class="label" x="1720" y="548">orders 1 - N order_tables</text>
  <path class="line" marker-end="url(#arrow)" d="M480 620 L1790 610"/>
  <text class="label" x="1120" y="602">tables 1 - N order_tables</text>
  <path class="line" marker-end="url(#arrow)" d="M1410 840 L1370 920"/>
  <text class="label" x="1390" y="892">orders 1 - 1 payments</text>
  <path class="line" marker-end="url(#arrow)" d="M1500 840 L1830 920"/>
  <text class="label" x="1650" y="892">orders 1 - 1 reviews</text>
  <path class="line" marker-end="url(#arrow)" d="M930 390 L1750 990"/>
  <text class="label" x="1240" y="760">users 1 - N reviews</text>
  <path class="line" marker-end="url(#arrow)" d="M1030 260 L1230 260"/>
  <text class="label" x="1060" y="248">users 1 - 1 employees</text>
</svg>
