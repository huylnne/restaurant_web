<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="2750" viewBox="0 0 3000 2750">
  <defs>
    <style>
      .bg { fill: #fff; }
      .rel { fill: none; stroke: #333; stroke-width: 3.2; stroke-linejoin: round; stroke-linecap: round; }
      .card { font: 800 28px Arial, sans-serif; fill: #111; }
      .tbl { box-sizing: border-box; width: 100%; height: 100%; border: 2.2px solid #555; background: #f3f3f3; font: 800 40px Arial, sans-serif; color: #111; overflow: hidden; }
      .title { height: 60px; line-height: 60px; border-bottom: 2.2px solid #555; background: #e7e7e7; text-align: center; font-weight: 900; font-size: 34px; }
      .fields { padding: 14px 24px; line-height: 45px; white-space: pre; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="3000" height="2750"/>

