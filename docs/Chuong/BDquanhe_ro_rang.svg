latitude: numeric
longitude: numeric
is_active: boolean
created_at: timestamp
updated_at: timestamp</div></div></foreignObject>

  <foreignObject x="40" y="650" width="560" height="580"><div xmlns="http://www.w3.org/1999/xhtml" class="tbl"><div class="title">MenuItem</div><div class="fields">item_id: int &lt;PK&gt;
