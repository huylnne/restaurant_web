  <foreignObject x="2400" y="650" width="560" height="580"><div xmlns="http://www.w3.org/1999/xhtml" class="tbl"><div class="title">User</div><div class="fields">user_id: int &lt;PK&gt;
branch_id: int &lt;FK&gt;
