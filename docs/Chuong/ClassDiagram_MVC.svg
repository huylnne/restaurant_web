<svg xmlns="http://www.w3.org/2000/svg" width="2480" height="3508" viewBox="0 0 2480 3508">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .mono { fill: #2f66d8; stroke: #1d4fb8; stroke-width: 8; rx: 28; ry: 28; }
      .layer { fill: #75c7d3; stroke: #1f2937; stroke-width: 5; rx: 22; ry: 22; }
      .card { fill: #e9f2f8; stroke: #1f2937; stroke-width: 4; rx: 16; ry: 16; }
      .chip { fill: #d5ecf7; stroke: #1f2937; stroke-width: 3.5; rx: 12; ry: 12; }

      .title { font: 700 104px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 44px Arial, sans-serif; fill: #334155; }
      .layer-title { font: 700 98px Arial, sans-serif; fill: #0b3b8a; }
      .card-title { font: 700 62px Arial, sans-serif; fill: #0f172a; }
      .line { font: 600 44px Arial, sans-serif; fill: #0f172a; }
      .api { font: 700 46px Arial, sans-serif; fill: #0f172a; }
      .note { font: 600 40px Arial, sans-serif; fill: #0f172a; }
      .arrow { stroke: #0f172a; stroke-width: 7; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="18" markerHeight="12" refX="15" refY="6" orient="auto">
      <path d="M0,0 L18,6 L0,12 z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="2480" height="3508"/>
  <text class="title" x="170" y="130">Monolithic MVC</text>

  <rect class="mono" x="120" y="220" width="2240" height="3160"/>

  <!-- VIEW -->
  <rect class="layer" x="190" y="300" width="2100" height="780"/>
  <text class="layer-title" x="1240" y="470" text-anchor="middle">1. VIEW</text>

  <rect class="card" x="250" y="580" width="620" height="440"/>
  <text class="card-title" x="560" y="675" text-anchor="middle">Public UI</text>
  <text class="line" x="305" y="770">Home / Menu</text>
  <text class="line" x="305" y="845">Branches / Nearby</text>

  <rect class="card" x="930" y="580" width="620" height="440"/>
  <text class="card-title" x="1240" y="675" text-anchor="middle">User UI</text>
  <text class="line" x="985" y="770">Login / Register</text>
  <text class="line" x="985" y="845">Booking / MyTable</text>

  <rect class="card" x="1610" y="580" width="620" height="440"/>
  <text class="card-title" x="1920" y="675" text-anchor="middle">Admin UI</text>
  <text class="line" x="1665" y="770">Dashboard / Reports</text>
  <text class="line" x="1665" y="845">Kitchen / Tables</text>

  <line class="arrow" x1="1240" y1="1105" x2="1240" y2="1200"/>

  <!-- CONTROLLER -->
  <rect class="layer" x="190" y="1240" width="2100" height="980"/>
  <text class="layer-title" x="1240" y="1415" text-anchor="middle">2. CONTROLLER</text>
  <text class="line" x="1240" y="1515" text-anchor="middle">Controller + Service API</text>

  <rect class="card" x="250" y="1610" width="620" height="420"/>
  <text class="card-title" x="560" y="1700" text-anchor="middle">Auth/User</text>
  <text class="line" x="305" y="1780">Auth / Authorization</text>
  <text class="line" x="305" y="1850">auth.ctrl + user.ctrl</text>
  <text class="line" x="305" y="1920">captcha.svc + user.svc</text>

  <rect class="card" x="930" y="1610" width="620" height="420"/>
  <text class="card-title" x="1240" y="1700" text-anchor="middle">Booking via Order</text>
  <text class="line" x="985" y="1780">Booking / table check</text>
  <text class="line" x="985" y="1850">reservation.ctrl</text>
  <text class="line" x="985" y="1920">+ reservation.svc</text>
  <text class="line" x="985" y="1990">Stored in orders</text>

  <rect class="card" x="1610" y="1610" width="620" height="420"/>
  <text class="card-title" x="1920" y="1700" text-anchor="middle">Order/Payment</text>
  <text class="line" x="1635" y="1780">Ordering / serving / payment</text>
  <text class="line" x="1635" y="1850">order.ctrl + waiter.ctrl</text>
  <text class="line" x="1635" y="1920">+ payments.ctrl</text>
  <text class="line" x="1635" y="1990">payment.svc + invoice.svc</text>

  <rect class="chip" x="260" y="2065" width="320" height="120"/><text class="api" x="420" y="2143" text-anchor="middle">Auth API</text>
  <rect class="chip" x="610" y="2065" width="320" height="120"/><text class="api" x="770" y="2143" text-anchor="middle">User API</text>
  <rect class="chip" x="960" y="2065" width="320" height="120"/><text class="api" x="1120" y="2143" text-anchor="middle">Order API</text>
  <rect class="chip" x="1310" y="2065" width="320" height="120"/><text class="api" x="1470" y="2143" text-anchor="middle">Payment API</text>
  <rect class="chip" x="1660" y="2065" width="320" height="120"/><text class="api" x="1820" y="2143" text-anchor="middle">Admin API</text>
  <rect class="chip" x="2010" y="2065" width="220" height="120"/><text class="api" x="2120" y="2143" text-anchor="middle">Report</text>

  <line class="arrow" x1="1240" y1="2260" x2="1240" y2="2350"/>

  <!-- MODEL -->
  <rect class="layer" x="190" y="2390" width="2100" height="900"/>
  <text class="layer-title" x="1240" y="2555" text-anchor="middle">3. MODEL</text>

  <rect class="card" x="250" y="2660" width="620" height="410"/>
  <text class="card-title" x="560" y="2750" text-anchor="middle">Identity</text>
  <text class="line" x="305" y="2835">users / branches</text>
  <text class="line" x="305" y="2905">employees / logs</text>

  <rect class="card" x="930" y="2660" width="620" height="410"/>
  <text class="card-title" x="1240" y="2750" text-anchor="middle">Core</text>
  <text class="line" x="985" y="2835">tables / orders / reviews</text>
  <text class="line" x="985" y="2905">No reservations table</text>
  <text class="line" x="985" y="2975">Booking stored in orders</text>

  <rect class="card" x="1610" y="2660" width="620" height="410"/>
  <text class="card-title" x="1920" y="2750" text-anchor="middle">Ordering</text>
  <text class="line" x="1665" y="2835">menu_items / order_items</text>
  <text class="line" x="1665" y="2905">payments</text>

</svg>
